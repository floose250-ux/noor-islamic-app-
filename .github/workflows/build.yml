name: Build APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # ✅ تنظيف شامل
      - run: rm -f pubspec.lock
      - run: rm -rf ~/.pub-cache
      - run: flutter clean
      
      # ✅ إضافة المكتبات الصحيحة
      - run: flutter pub add intl:^0.19.0
      - run: flutter pub add geolocator:^10.1.0
      
      - run: flutter pub get

      # ✅ إعادة إنشاء Android
      - run: rm -rf android
      - run: flutter create . --project-name noor_islamic_app
      
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
